<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Frontend</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-form">
        <h1>Login</h1>
        <input id="username" placeholder="Username" />
        <br><br>
        <input id="password" type="password" placeholder="Password" />
        <br><br>
        <button id="login-btn">Login</button>
        <button id="register-page-btn">Register</button>

    </div>
    <div id="register-form">
        <h1>Register</h1>
        <input id="new-email" placeholder="Email" />
        <br><br>
        <input id="new-username" placeholder="Username" />
        <br><br>
        <input id="new-password" type="password" placeholder="Password" />
        <br><br>
        <button id="register-btn">Register</button>
        <button id="close-register-btn">Back</button>
    </div>
    <button id="logout-btn">Logout</button>
    <div id="task-form">
        <h2>Tasks</h2>
        <input id="task-title" placeholder="Task title" />
        <textarea id="task-description" placeholder="Task description"></textarea>
        <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <input id="task-due-date" type="date" />
        <button id="add-task-btn">Add task</button>
    </div>
    <div id="output"></div>
    <div id="pagination"></div>
    <div id="confirm-modal" class=" modal hidden">
        <div class="modal-content">
            <p>Are you sure you want to delete this task?</p>
            <div class="modal-actions">
                <button id="confirm-delete" class="delete-btn">Delete</button>
                <button id="cancel-delete">Cancel</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
